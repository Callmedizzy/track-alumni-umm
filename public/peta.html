<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peta Sebaran Alumni — UMM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  
  <style>
    :root {
      --bg: #eef2f7;
      --card: #ffffff;
      --dark: #1f2a44;
      --muted: #64748b;
      --line: #e2e8f0;
      --accent: #4f46e5;
      --primary: #2563eb;
      --primary-dark: #1e40af;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Outfit", sans-serif;
      background: var(--bg);
      color: #0f172a;
    }

    .site-header {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
    }

    .site-header-inner {
      max-width: 1380px;
      margin: 0 auto;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .brand-logo {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
      background: #eef2ff;
    }

    .brand-text {
      margin: 0;
      font-size: 24px;
      font-weight: 800;
      color: #1e3a8a;
      line-height: 1;
    }

    .header-back {
      text-decoration: none;
      color: var(--accent);
      font-weight: 600;
      border: 1px solid rgba(79, 70, 229, 0.28);
      border-radius: 9px;
      padding: 7px 16px;
      background: #fff;
      transition: all 0.2s;
    }

    .header-back:hover {
      background: var(--accent);
      color: white;
    }

    .wrap {
      max-width: 1380px;
      margin: 14px auto 24px;
      padding: 0 14px;
    }

    .hero-banner {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      border-radius: 16px;
      padding: 40px;
      color: white;
      margin-bottom: 24px;
      box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.3);
      position: relative;
      overflow: hidden;
    }

    .hero-banner::before {
      content: "";
      position: absolute;
      top: -50%;
      right: -10%;
      width: 400px;
      height: 400px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      pointer-events: none;
    }

    .hero-sub {
      font-size: 18px;
      font-weight: 500;
      opacity: 0.9;
      margin-bottom: 8px;
    }

    .hero-title {
      font-size: 36px;
      font-weight: 800;
      margin: 0;
      line-height: 1.2;
    }

    .map-card {
      background: white;
      border-radius: 20px;
      padding: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      border: 1px solid var(--line);
      overflow: hidden;
    }

    #map {
      height: 600px;
      width: 100%;
      border-radius: 14px;
      z-index: 1;
    }

    .map-info {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 16px;
      padding: 10px;
    }

    .info-box {
      background: #f8fafc;
      padding: 16px;
      border-radius: 12px;
      border-left: 4px solid var(--primary);
    }

    .info-box h4 {
      margin: 0 0 4px;
      font-size: 14px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .info-box p {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
    }

    @media (max-width: 768px) {
      .hero-title { font-size: 28px; }
      #map { height: 400px; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="site-header-inner">
      <a href="index.html" class="brand">
        <img src="logo-umm.png" alt="UMM" class="brand-logo" onerror="this.src='https://via.placeholder.com/40'">
        <span class="brand-text">UMM Tracker</span>
      </a>
      <a href="index.html" class="header-back">Kembali ke Beranda</a>
    </div>
  </header>

  <main class="wrap">
    <div class="hero-banner">
      <div class="hero-sub">Visualisasi Data</div>
      <h1 class="hero-title">Peta Sebaran Alumni</h1>
    </div>

    <div class="map-card">
      <div id="map"></div>
      
      <div class="map-info">
        <div class="info-box">
          <h4>Total Provinsi</h4>
          <p>38 Provinsi</p>
        </div>
        <div class="info-box">
          <h4>Konsentrasi Tertinggi</h4>
          <p>Jawa Timur (42.5%)</p>
        </div>
        <div class="info-box">
          <h4>Alumni Terlacak</h4>
          <p>142,292 Orang</p>
        </div>
      </div>
    </div>
  </main>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  
  <script>
    // Initialize the map
    const map = L.map('map').setView([-2.5489, 118.0149], 5);

    // Add Tile Layer (CartoDB Positron - clean and professional)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 20
    }).addTo(map);

    // Alumni Distribution Data (Dummy for visualization)
    const alumniPoints = [
      { name: "Malang (Pusat)", coords: [-7.9666, 112.6326], count: "45,210" },
      { name: "Jakarta", coords: [-6.2088, 106.8456], count: "22,150" },
      { name: "Surabaya", coords: [-7.2575, 112.7521], count: "18,420" },
      { name: "Bandung", coords: [-6.9175, 107.6191], count: "12,300" },
      { name: "Medan", coords: [3.5952, 98.6722], count: "5,120" },
      { name: "Makassar", coords: [-5.1476, 119.4327], count: "6,840" },
      { name: "Yogyakarta", coords: [-7.7956, 110.3695], count: "9,500" },
      { name: "Denpasar", coords: [-8.6705, 115.2126], count: "4,200" },
      { name: "Samarinda", coords: [-0.4949, 117.1436], count: "3,800" },
      { name: "Jayapura", coords: [-2.5916, 140.6690], count: "1,200" }
    ];

    // Custom Icon
    const alumniIcon = L.divIcon({
      className: 'custom-div-icon',
      html: "<div style='background-color:rgba(37, 99, 235, 0.6); width:20px; height:20px; border-radius:50%; border:2px solid #fff; box-shadow:0 0 10px rgba(37, 99, 235, 0.4);'></div>",
      iconSize: [20, 20],
      iconAnchor: [10, 10]
    });

    // Add markers to the map
    alumniPoints.forEach(point => {
      const marker = L.marker(point.coords, { icon: alumniIcon }).addTo(map);
      marker.bindPopup(`
        <div style="font-family:'Outfit', sans-serif;">
          <strong style="color:#1e40af; font-size:16px;">${point.name}</strong><br>
          <span style="color:#64748b;">Jumlah Alumni:</span> 
          <strong style="color:#1f2a44;">${point.count}</strong>
        </div>
      `);
    });

    // Add a circle for Malang area (High concentration)
    L.circle([-7.9666, 112.6326], {
      color: '#2563eb',
      fillColor: '#3b82f6',
      fillOpacity: 0.2,
      radius: 100000
    }).addTo(map).bindPopup("Konsentrasi Tertinggi: Jawa Timur");

  </script>
</body>
</html>
